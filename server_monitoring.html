<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서버 상태 모니터링 대시보드</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="header-title">
                    <h1>서버 모니터링</h1>
                    <div class="info-icon" id="mode-info">ⓘ
                        <div class="tooltip">
                            <strong>모드 선택 안내</strong>
                            <p><strong>NO-CORS:</strong> Status code 확인 불가하지만 CORS 제한 없이 모든 서버 확인 가능</p>
                            <p><strong>CORS:</strong> Status code 확인 가능하지만 서버에서 CORS 헤더 설정 필요</p>
                            <p style="margin-top: 10px; font-size: 0.9em; color: #999;">💡 CORS는 브라우저 보안 정책으로, 다른 도메인의 리소스 접근을 제한합니다. (Status code 값을 자세히 알려면 서버 필요)</p>
                        </div>
                    </div>
                </div>
                <div class="mode-selector">
                    <button id="mode-no-cors" class="mode-btn active">NO-CORS</button>
                    <button id="mode-cors" class="mode-btn">CORS</button>
                </div>
            </div>
            <div class="stats-section">
                <div class="stat-item total active" data-filter="all">
                    <div class="stat-icon">●</div>
                    <div>
                        <div class="stat-label">총 서버</div>
                        <div class="stat-value" id="total-servers">0</div>
                    </div>
                </div>

                <div class="stat-item online" data-filter="online">
                    <div class="stat-icon">●</div>
                    <div>
                        <div class="stat-label">온라인</div>
                        <div class="stat-value" id="online-servers">0</div>
                    </div>
                </div>

                <div class="stat-item offline" data-filter="offline">
                    <div class="stat-icon">●</div>
                    <div>
                        <div class="stat-label">오프라인</div>
                        <div class="stat-value" id="offline-servers">0</div>
                    </div>
                </div>

                <div class="stat-item uptime">
                    <div class="stat-icon">●</div>
                    <div>
                        <div class="stat-label">가동률</div>
                        <div class="stat-value" id="uptime-percentage">0%</div>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="refresh-button" class="refresh-btn">
                    <span class="refresh-icon">⟳</span> 새로고침
                </button>
                <div class="last-updated">
                    <small>업데이트: <span id="last-updated-time">-</span></small>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <div class="server-grid" id="server-grid"></div>
        </main>
    </div>

    <script src="servers.js"></script>
    <script src="app.js"></script>
</body>
</html>
