<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서버 상태 모니터링 대시보드</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>서버 모니터링</h1>
            </div>
            <div class="stats-section">
                <div class="stat-item total">
                    <div class="stat-icon">●</div>
                    <div>
                        <div class="stat-label">총 서버</div>
                        <div class="stat-value" id="total-servers">0</div>
                    </div>
                </div>

                <div class="stat-item online">
                    <div class="stat-icon">●</div>
                    <div>
                        <div class="stat-label">온라인</div>
                        <div class="stat-value" id="online-servers">0</div>
                    </div>
                </div>

                <div class="stat-item offline">
                    <div class="stat-icon">●</div>
                    <div>
                        <div class="stat-label">오프라인</div>
                        <div class="stat-value" id="offline-servers">0</div>
                    </div>
                </div>

                <div class="stat-item uptime">
                    <div class="stat-icon">●</div>
                    <div>
                        <div class="stat-label">가동률</div>
                        <div class="stat-value" id="uptime-percentage">0%</div>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="refresh-button" class="refresh-btn">
                    <span class="refresh-icon">⟳</span> 새로고침
                </button>
                <div class="last-updated">
                    <small>업데이트: <span id="last-updated-time">-</span></small>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <div class="server-grid" id="server-grid"></div>
        </main>
    </div>

    <script src="servers.js"></script>
    <script src="app.js"></script>
</body>
</html>
